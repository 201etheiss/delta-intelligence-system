# Redis 7+ configuration for Delta Intelligence DataOS
# Streams-enabled for event delivery layer

# Persistence
save 60 1000
save 300 100
appendonly yes
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Streams — keep reasonable history per stream
stream-node-max-bytes 4096
stream-node-max-entries 100

# Networking
tcp-keepalive 300
timeout 0

# Logging
loglevel notice
